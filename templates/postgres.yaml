# PostgreSQL — 관계형 저장소. postgres.enabled로 토글(매니지드 DB면 false).
{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    {{- include "docux.labels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "docux.selectorLabels" (dict "root" . "component" "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "docux.labels" (dict "root" . "component" "postgres") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: {{ include "docux.image" .Values.postgres.image | quote }}
          ports:
            - containerPort: 5432
          env:
            - { name: POSTGRES_DB,   value: "docux" }
            - { name: POSTGRES_USER, value: "docux" }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ .Values.secret.existingSecret }}, key: POSTGRES_PASSWORD } }
            - { name: PGDATA, value: "/var/lib/postgresql/data/pgdata" }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "docux", "-d", "docux"] }
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: {{ .Values.postgres.storage.size }} } }
        {{- with .Values.postgres.storage.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    {{- include "docux.labels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  selector:
    {{- include "docux.selectorLabels" (dict "root" . "component" "postgres") | nindent 4 }}
  ports:
    - port: 5432
      targetPort: 5432
{{- end }}
