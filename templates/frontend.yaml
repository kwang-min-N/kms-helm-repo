# 프론트엔드(nginx 정적 SPA) — Deployment + Service.
{{- $img := include "docux.image" .Values.frontend.image }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docux-frontend
  labels:
    {{- include "docux.labels" (dict "root" . "component" "frontend") | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      {{- include "docux.selectorLabels" (dict "root" . "component" "frontend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "docux.labels" (dict "root" . "component" "frontend") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 101            # nginx-unprivileged
      containers:
        - name: frontend
          image: {{ $img | quote }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - { name: BACKEND_URL, value: {{ .Values.frontend.backendUrl | quote }} }
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: docux-frontend
  labels:
    {{- include "docux.labels" (dict "root" . "component" "frontend") | nindent 4 }}
spec:
  selector:
    {{- include "docux.selectorLabels" (dict "root" . "component" "frontend") | nindent 4 }}
  ports:
    - port: 8080
      targetPort: 8080
