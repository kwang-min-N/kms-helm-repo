# 비민감 설정 — values.config를 그대로 ConfigMap으로 렌더(서비스 주소·backend 토글).
apiVersion: v1
kind: ConfigMap
metadata:
  name: docux-config
  labels:
    {{- include "docux.labels" (dict "root" . "component" "config") | nindent 4 }}
data:
  {{- range $k, $v := .Values.config }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
