# OpenSearch(어휘 Nori + 벡터 k-NN) — opensearch.enabled로 토글.
# 이미지는 Dockerfile.opensearch(analysis-nori) 빌드본이어야 한다.
{{- if .Values.opensearch.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
  labels:
    {{- include "docux.labels" (dict "root" . "component" "opensearch") | nindent 4 }}
spec:
  serviceName: opensearch
  replicas: 1
  selector:
    matchLabels:
      {{- include "docux.selectorLabels" (dict "root" . "component" "opensearch") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "docux.labels" (dict "root" . "component" "opensearch") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.opensearch.setSysctl }}
      initContainers:
        - name: sysctl
          image: busybox:1.36
          command: ["sh", "-c", "sysctl -w vm.max_map_count=262144"]
          securityContext: { privileged: true }
      {{- end }}
      containers:
        - name: opensearch
          image: {{ include "docux.image" .Values.opensearch.image | quote }}
          ports:
            - containerPort: 9200
          env:
            - { name: discovery.type, value: "single-node" }
            - { name: DISABLE_SECURITY_PLUGIN, value: "true" }
            - { name: OPENSEARCH_JAVA_OPTS, value: {{ .Values.opensearch.javaOpts | quote }} }
          readinessProbe:
            httpGet: { path: /_cluster/health, port: 9200 }
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - { name: data, mountPath: /usr/share/opensearch/data }
          resources:
            {{- toYaml .Values.opensearch.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: {{ .Values.opensearch.storage.size }} } }
        {{- with .Values.opensearch.storage.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  labels:
    {{- include "docux.labels" (dict "root" . "component" "opensearch") | nindent 4 }}
spec:
  selector:
    {{- include "docux.selectorLabels" (dict "root" . "component" "opensearch") | nindent 4 }}
  ports:
    - port: 9200
      targetPort: 9200
{{- end }}
